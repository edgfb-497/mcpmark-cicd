name: Deployment Status

on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    name: pre-deployment
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create-issue.outputs.result }}
      previous_commit: ${{ github.event.before }}
      current_commit: ${{ github.sha }}
      package_version: ${{ fromJSON(readFile('package.json')).version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint || echo "Lint checks failed (adjust script if needed)"

      - name: Run tests
        run: npm test || echo "Tests failed (adjust script if needed)"

      - name: Create deployment tracking issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const packageJson = JSON.parse(readFile('package.json'));
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${context.sha}`,
              labels: ['deployment', 'in-progress'],
              body: `
## Deployment In Progress
- Current Commit: ${context.sha}
- Previous Commit: ${context.event.before}
- Package Version: ${packageJson.version}
              `
            });
            return issue.number;

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create-issue.outputs.result }},
              body: "Pre-deployment checks completed"
            });

  rollback-preparation:
    name: rollback-preparation
    needs: pre-deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Create rollback script
        run: |
          cat > rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          # Rollback Script for Node.js Deployment
          PREVIOUS_COMMIT="${{ needs.pre-deployment.outputs.previous_commit }}"
          CURRENT_COMMIT="${{ needs.pre-deployment.outputs.current_commit }}"

          echo "=== Starting Rollback from $CURRENT_COMMIT to $PREVIOUS_COMMIT ==="

          # 1. Revert to previous commit
          echo "Reverting to previous commit: $PREVIOUS_COMMIT"
          git checkout "$PREVIOUS_COMMIT" || { echo "Failed to checkout previous commit"; exit 1; }

          # 2. Restore dependencies
          echo "Restoring dependencies..."
          npm ci || { echo "Failed to restore dependencies"; exit 1; }

          # 3. Verify application state
          echo "Verifying application state..."
          npm run test -- --no-watch || { echo "Application verification failed"; exit 1; }

          echo "=== Rollback completed successfully to $PREVIOUS_COMMIT ==="
          EOF
          chmod +x rollback.sh

      - name: Create configuration backups
        run: |
          mkdir -p rollback-backups
          # Backup package files
          cp package.json rollback-backups/
          cp package-lock.json rollback-backups/
          # Backup environment template if exists
          [ -f .env.example ] && cp .env.example rollback-backups/
          echo "Configuration backups created"

      - name: Create dependency verification script
        run: |
          cat > verify-dependencies.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "=== Verifying Dependencies ==="

          # Check for missing dependencies
          echo "Checking for missing dependencies..."
          npm ls --depth=0 || { echo "❌ Missing dependencies found"; exit 1; }

          # Check for high-severity vulnerabilities
          echo "Checking for vulnerabilities..."
          npm audit --audit-level=high || { echo "❌ High-severity vulnerabilities found"; exit 1; }

          echo "✅ Dependencies verified successfully"
          EOF
          chmod +x verify-dependencies.sh

      - name: Create rollback documentation
        run: |
          cat > rollback-docs.md << 'EOF'
          # Rollback Instructions for Deployment ${{ needs.pre-deployment.outputs.current_commit }}

          ## Prerequisites
          - GitHub CLI installed (optional, for artifact download)
          - Node.js and npm installed
          - Git access to the repository

          ## Step 1: Download Rollback Artifact
          Download the rollback package from GitHub Actions artifacts:
          - Artifact Name: `rollback-package-${{ needs.pre-deployment.outputs.current_commit }}`
          - Contains: Rollback script, backups, verification script, and documentation

          ## Step 2: Extract the Package
          ```bash
          unzip rollback-package-${{ needs.pre-deployment.outputs.current_commit }}.zip
          cd rollback-package-${{ needs.pre-deployment.outputs.current_commit }}
          ```

          ## Step 3: Execute Rollback
          ```bash
          ./rollback.sh
          ```

          ## Step 4: Verify Rollback
          ```bash
          ./verify-dependencies.sh
          npm run test
          ```

          ## Step 5: Confirm Rollback
          Check the current commit:
          ```bash
          git rev-parse HEAD
          # Should match: ${{ needs.pre-deployment.outputs.previous_commit }}
          ```
          EOF

      - name: Create compressed rollback package
        run: |
          # Create package directory
          PACKAGE_DIR="rollback-package-${{ needs.pre-deployment.outputs.current_commit }}"
          mkdir -p "$PACKAGE_DIR"

          # Add files to package
          cp rollback.sh "$PACKAGE_DIR/"
          cp -r rollback-backups "$PACKAGE_DIR/"
          cp verify-dependencies.sh "$PACKAGE_DIR/"
          cp rollback-docs.md "$PACKAGE_DIR/"

          # Compress package
          zip -r "$PACKAGE_DIR.zip" "$PACKAGE_DIR/"

          # Generate SHA256 checksum
          sha256sum "$PACKAGE_DIR.zip" > "$PACKAGE_DIR.sha256"

          echo "Rollback package created: $PACKAGE_DIR.zip"
          echo "Checksum file: $PACKAGE_DIR.sha256"

      - name: Upload rollback artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rollback-package-${{ needs.pre-deployment.outputs.current_commit }}
          path: |
            rollback-package-${{ needs.pre-deployment.outputs.current_commit }}.zip
            rollback-package-${{ needs.pre-deployment.outputs.current_commit }}.sha256
          retention-days: 30

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            const PACKAGE_NAME = "rollback-package-${{ needs.pre-deployment.outputs.current_commit }}";
            const checksum = readFile(`${PACKAGE_NAME}.sha256`).split(' ')[0];
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              body: `
## 🔄 Rollback Plan Ready

### Deployment Metadata
- Previous Commit: ${{ needs.pre-deployment.outputs.previous_commit }}
- Current Commit: ${{ needs.pre-deployment.outputs.current_commit }}
- Package Version: ${{ needs.pre-deployment.outputs.package_version }}
- Artifact: ${PACKAGE_NAME}

### Completed Rollback Components
✅ Rollback script with error handling
✅ Configuration backups (package.json, package-lock.json)
✅ Dependency verification script
✅ Step-by-step rollback documentation
✅ Compressed rollback package with checksum

### Quick Rollback Command
\`\`\`bash
# Download artifact (using GitHub CLI)
gh run download --name ${PACKAGE_NAME} --dir .

# Extract and execute
unzip ${PACKAGE_NAME}.zip
cd ${PACKAGE_NAME}
./rollback.sh
./verify-dependencies.sh
\`\`\`

### Verification Statuses
- Rollback script created: true
- Configuration backup: true

### Artifact Integrity
SHA256: ${checksum}
              `
            });

  post-deployment:
    name: post-deployment
    needs: rollback-preparation
    runs-on: ubuntu-latest
    steps:
      - name: Download rollback artifact
        uses: actions/download-artifact@v4
        with:
          name: rollback-package-${{ needs.pre-deployment.outputs.current_commit }}

      - name: Update issue labels
        uses: actions/github-script@v7
        with:
          script: |
            const ISSUE_NUMBER = ${{ needs.pre-deployment.outputs.issue_number }};
            
            // Remove "in-progress" label
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ISSUE_NUMBER,
              name: 'in-progress'
            });

            // Add "completed" label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ISSUE_NUMBER,
              labels: ['completed']
            });

      - name: Post final deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            const PACKAGE_NAME = "rollback-package-${{ needs.pre-deployment.outputs.current_commit }}";
            const checksum = readFile(`${PACKAGE_NAME}.sha256`).split(' ')[0];
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              body: `
## Deployment Completed Successfully

### Rollback Artifact Details
- Artifact Name: ${PACKAGE_NAME}
- SHA256 Checksum: ${checksum}
- Retention Period: 30 days
- Download: Available in GitHub Actions artifacts for this run

### Deployment Summary
- Deployed Commit: ${{ needs.pre-deployment.outputs.current_commit }}
- Previous Commit: ${{ needs.pre-deployment.outputs.previous_commit }}
- Package Version: ${{ needs.pre-deployment.outputs.package_version }}
              `
            });

      - name: Close deployment tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              state: 'closed'
            });